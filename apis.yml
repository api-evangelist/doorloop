    name: DoorLoop API
    description: >-
      REST API for DoorLoop property management software. Provides access to
      properties, units, leases, tenants, rent collection, maintenance requests,
      accounting, and tenant communication. Authenticated via API keys managed
      under Zapier & API Keys in company settings. Returns JSON-encoded
      responses and supports OData queries for filtering and pagination.
    image: >-
